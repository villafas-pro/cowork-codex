<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
      background: #0d0d0d;
      color: #e5e5e5;
    }
    .section-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .row { display: flex; align-items: flex-end; gap: 28px; margin-bottom: 40px; }
    .size-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .size-label { font-size: 9px; color: #444; }

    /* Taskbar sim */
    .taskbar {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 280px;
    }
    .task-text { font-size: 11px; color: #ccc; }

    /* Desktop sim */
    .desktop-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .desktop-label { font-size: 10px; color: #aaa; }

    /* Light bg check */
    .light-bg { background: #f0f0f0; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .light-label { font-size: 11px; color: #333; }

    /* Checkered transparency indicator */
    .checker {
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
      border-radius: 6px;
      padding: 8px;
      display: inline-flex;
    }
  </style>
</head>
