<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Cowork Codex — Logo Concept</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 48px;
      min-height: 100vh;
    }
    header { margin-bottom: 40px; }
    header h1 { font-size: 11px; font-weight: 600; color: #e8b800; letter-spacing: 0.1em; text-transform: uppercase; }
    header p { font-size: 12px; color: #555; margin-top: 5px; }

    .showcase {
      display: flex;
      align-items: flex-end;
      gap: 40px;
      margin-bottom: 52px;
    }
    .size-group { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .size-label { font-size: 10px; color: #444; letter-spacing: 0.05em; }

    .section-label { font-size: 10px; color: #555; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
    .context-row { display: flex; flex-direction: column; gap: 10px; }

    .sim-titlebar {
      background: #111; border: 1px solid #222; border-radius: 10px; width: 320px; overflow: hidden;
    }
    .sim-bar {
      background: #0d0d0d; border-bottom: 1px solid #1e1e1e; padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .sim-dots { display: flex; gap: 5px; }
    .sim-dot { width: 10px; height: 10px; border-radius: 50%; background: #252525; }
    .sim-title { font-size: 11px; color: #e8b800; font-weight: 600; margin-left: 4px; }
    .sim-body { padding: 14px; display: flex; gap: 10px; }
    .sim-sidebar { width: 36px; display: flex; flex-direction: column; gap: 8px; align-items: center; padding-top: 2px; }
    .sim-nav { width: 20px; height: 20px; border-radius: 5px; background: #1e1e1e; }
    .sim-nav.active { background: #e8b80018; }
    .sim-content { flex: 1; display: flex; flex-direction: column; gap: 6px; padding-top: 2px; }
    .sim-line { height: 5px; border-radius: 2px; background: #1e1e1e; }

    .sim-taskbar {
      background: #111; border: 1px solid #222; border-radius: 10px;
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; width: 320px;
    }
    .sim-task-name { font-size: 11px; color: #ccc; font-weight: 500; }
    .sim-task-sub { font-size: 10px; color: #444; margin-top: 2px; }
  </style>
</head>
